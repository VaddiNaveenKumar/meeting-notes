server.port=8080

# ─── Datasource ────────────────────────────────────────────────────────────────
# All values MUST be set via environment variables — no hardcoded defaults.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# ─── Email (Resend) ────────────────────────────────────────────────────────────
resend.api-key=${RESEND_API_KEY}
app.mail.from=${MAIL_FROM:noreply@example.com}

# ─── Gemini LLM API Keys (all pooled; 429 auto-rotates to next key) ────────────
app.gemini.primary-key=${GEMINI_KEY1}
app.gemini.fallback-key=${GEMINI_KEY2}
app.gemini.key3=${GEMINI_KEY3}
app.gemini.key4=${GEMINI_KEY4}
app.gemini.key5=${GEMINI_KEY5}

# ─── HTTP timeouts (ms) for RestTemplate ───────────────────────────────────────
http.client.connect-timeout=10000
http.client.read-timeout=60000

# ─── JWT ───────────────────────────────────────────────────────────────────────
# Secret MUST be at least 256 bits (32 chars). Set JWT_SECRET env var.
app.jwt.secret=${JWT_SECRET}
# 1 day in ms (reduced from 7 days)
app.jwt.expiration-ms=86400000

# ─── Notion OAuth (optional) ───────────────────────────────────────────────────
notion.client-id=${NOTION_CLIENT_ID:}
notion.client-secret=${NOTION_CLIENT_SECRET:}
notion.redirect-uri=${NOTION_REDIRECT_URI:http://localhost:5173/notion/callback}
